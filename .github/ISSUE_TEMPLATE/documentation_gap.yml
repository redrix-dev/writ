name: Documentation gap
description: Report unclear, missing, or inaccurate documentation.
title: "[Docs]: "
labels: [documentation]
body:
  - type: input
    id: page
    attributes:
      label: Page or section
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: What were you trying to do?
    validations:
      required: true
  - type: textarea
    id: gap
    attributes:
      label: What was unclear or missing?
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Suggested correction
