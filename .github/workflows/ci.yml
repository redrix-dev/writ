name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ci

  react-18:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install minimum supported React
        run: |
          npm pkg set "devDependencies.react=18.3.1" "devDependencies.react-dom=18.3.1" "devDependencies.react-test-renderer=18.3.1" "devDependencies.@types/react=18.3.28" "devDependencies.@types/react-test-renderer=18.3.1" --workspace @redrixx/writ-react
          npm install
      - run: npm run build
      - run: npm run test:compat --workspace @redrixx/writ-react
